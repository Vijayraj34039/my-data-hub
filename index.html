<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Data Hub | Auto-Lock Active</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
    
    <style>
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .editable-focus:focus { outline: 2px solid #3b82f6; background: rgba(30, 41, 59, 1); padding: 4px; border-radius: 4px; color: white; }
        .status-pill { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
        tr { transition: all 0.3s ease; }
        .row-delete { opacity: 0; transition: opacity 0.2s; cursor: pointer; }
        tr:hover .row-delete { opacity: 1; }
        .hidden-app { display: none !important; }
        .lock-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans antialiased overflow-hidden">

<div id="loginScreen" class="fixed inset-0 z-[200] flex items-center justify-center bg-[#0b0f1a]">
    <div class="glass-panel p-10 rounded-3xl shadow-2xl w-full max-w-md border border-blue-500/20 text-center">
        <div class="h-12 w-12 bg-blue-600 rounded-xl mx-auto mb-6 shadow-[0_0_30px_rgba(37,99,235,0.4)] flex items-center justify-center">
            <svg class="w-6 h-6 text-white lock-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-white mb-2 uppercase tracking-tighter">Secure Session</h1>
        <p class="text-[10px] text-slate-500 mb-8 tracking-widest uppercase">Encryption Node: Active</p>
        
        <input type="password" id="passKey" placeholder="Enter Passkey" 
               class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-center text-white mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
        
        <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest transition-all">
            Unlock Interface
        </button>
        <p id="errorMsg" class="text-red-500 text-[10px] mt-4 opacity-0">Invalid Credentials</p>
    </div>
</div>

<div id="mainApp" class="flex h-screen w-full hidden-app opacity-0 transition-opacity duration-1000">
    <aside class="w-72 bg-[#080c14] border-r border-slate-800 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-10">
            <div class="h-8 w-8 bg-blue-600 rounded-lg shadow-lg"></div>
            <span class="text-xs font-bold tracking-widest text-slate-400 uppercase leading-tight">Secure Hub<br><span class="text-[9px] text-emerald-500">Authorized</span></span>
        </div>
        <nav class="space-y-4 flex-1">
            <button onclick="openSecurityModal()" class="w-full py-3 px-4 rounded-xl border border-red-500/30 text-red-400 text-[10px] font-bold uppercase tracking-widest hover:bg-red-500/10 transition-all">Format Table</button>
            <button onclick="logout()" class="w-full py-3 px-4 rounded-xl border border-slate-700 text-slate-500 text-[10px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-all">Manual Lock</button>
        </nav>
        <div class="mt-auto text-[9px] text-slate-600 uppercase text-center border-t border-slate-800 pt-4">Auto-Lock: 10m Idle</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-24 border-b border-slate-800 flex items-center justify-between px-8 bg-[#0b0f1a]/50 backdrop-blur-md gap-4">
            <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Filter current data scale..." class="max-w-md w-full pl-4 py-2 border border-slate-700 rounded-xl bg-slate-900/50 text-slate-200 outline-none focus:border-blue-500">
            <div class="flex gap-3">
                <button onclick="exportToPDF()" class="bg-slate-800 px-4 py-2.5 rounded-xl border border-slate-700 text-xs font-bold uppercase tracking-widest text-slate-300">Export Report</button>
                <button onclick="syncNewOrder()" class="bg-blue-600 px-6 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg shadow-blue-500/20">+ Sync Data</button>
            </div>
        </header>

        <section class="p-8 overflow-y-auto">
            <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden border border-slate-800/50">
                <table class="w-full text-left" id="mainDataTable">
                    <thead class="bg-slate-900/90 text-slate-500 text-[10px] uppercase tracking-widest font-black">
                        <tr>
                            <th class="p-5 border-b border-slate-800">Unique ID</th>
                            <th class="p-5 border-b border-slate-800">Customer (Editable)</th>
                            <th class="p-5 border-b border-slate-800 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="mainTableBody">
                        <tr class="hover:bg-blue-500/5 border-b border-slate-800/40">
                            <td class="p-5 font-mono text-blue-400 text-sm">#ORD-9901</td>
                            <td class="p-5 text-sm" contenteditable="true" onblur="showToast('Data Modification Saved')">Global Systems Inc</td>
                            <td class="p-5 text-right">
                                <button onclick="deleteRow(this)" class="row-delete text-red-400 p-2 font-bold hover:scale-125 transition-transform">×</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<div id="securityModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[300] hidden flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-sm p-8 rounded-3xl shadow-2xl border border-red-500/30">
        <h3 class="text-lg font-bold text-white mb-2 italic">Format Command</h3>
        <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest font-bold">Type: <span class="text-red-500">RESET-CONFIRM</span></p>
        <input type="text" id="securityInput" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white mb-4 outline-none">
        <div class="flex gap-3">
            <button onclick="closeSecurityModal()" class="flex-1 py-3 bg-slate-800 rounded-xl text-[10px] uppercase font-bold">Cancel</button>
            <button onclick="verifyAndReset()" class="flex-1 py-3 bg-red-600 rounded-xl text-[10px] uppercase font-bold">Format</button>
        </div>
    </div>
</div>

<div id="confirmationToast" class="fixed bottom-8 right-8 translate-y-20 opacity-0 transition-all duration-500 z-50">
    <div class="bg-blue-600 text-white px-6 py-4 rounded-2xl text-xs font-bold uppercase tracking-widest shadow-2xl shadow-blue-500/40">
        <span id="toastText">Verified</span>
    </div>
</div>

<script>
    let idleTimer;
    const IDLE_TIME_LIMIT = 10 * 60 * 1000; // 10 Minutes

    /* --- AUTHENTICATION & AUTO-LOCK --- */
    function checkAuth() {
        const pass = document.getElementById('passKey').value;
        if(pass === "ADMIN-2026") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden-app');
            setTimeout(() => { document.getElementById('mainApp').classList.add('opacity-100'); }, 100);
            startIdleTimer();
        } else {
            document.getElementById('errorMsg').style.opacity = '1';
            setTimeout(() => { document.getElementById('errorMsg').style.opacity = '0'; }, 2000);
        }
    }

    function logout() { window.location.reload(); }

    function resetIdleTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(logout, IDLE_TIME_LIMIT);
    }

    function startIdleTimer() {
        window.onmousemove = resetIdleTimer;
        window.onmousedown = resetIdleTimer;
        window.ontouchstart = resetIdleTimer;
        window.onclick = resetIdleTimer;
        window.onkeypress = resetIdleTimer;
        resetIdleTimer();
    }

    /* --- DATA OPERATIONS --- */
    function syncNewOrder() {
        const id = "ORD-" + Math.floor(1000 + Math.random() * 9000);
        const row = `<tr class="border-b border-slate-800/40 hover:bg-blue-500/5 transition-all">
            <td class="p-5 font-mono text-blue-300">#${id}</td>
            <td class="p-5" contenteditable="true" onblur="showToast('Entry Verified')">New Client Reference...</td>
            <td class="p-5 text-right"><button onclick="deleteRow(this)" class="row-delete text-red-400 font-bold p-2">×</button></td>
        </tr>`;
        document.getElementById('mainTableBody').insertAdjacentHTML('afterbegin', row);
        showToast("Session: Sync Completed");
    }

    function deleteRow(btn) { btn.closest('tr').remove(); showToast("Action: Row Purged"); }
    
    function filterData() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let rows = document.getElementById('mainTableBody').getElementsByTagName('tr');
        for (let r of rows) { r.style.display = r.innerText.toLowerCase().includes(val) ? "" : "none"; }
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Secure Enterprise Data report", 14, 20);
        doc.autoTable({ html: '#mainDataTable', startY: 30, theme: 'grid', headStyles: {fillColor: [15, 23, 42]} });
        doc.save("Secure_Report.pdf");
        showToast("Export: Success");
    }

    /* --- UI UTILS --- */
    function openSecurityModal() { document.getElementById('securityModal').classList.remove('hidden'); }
    function closeSecurityModal() { document.getElementById('securityModal').classList.add('hidden'); document.getElementById('securityInput').value = ''; }
    
    function verifyAndReset() {
        if(document.getElementById('securityInput').value === "RESET-CONFIRM") {
            document.getElementById('mainTableBody').innerHTML = '';
            showToast("System: Format Complete");
            closeSecurityModal();
        }
    }

    function showToast(msg) {
        const t = document.getElementById('confirmationToast');
        document.getElementById('toastText').innerText = msg;
        t.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
    }
</script>
</body>
</html>
